<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Frazioni sulla linea</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 40px;
    }

    .line-container {
      position: relative;
      width: 600px;
      height: 80px;
      margin: 40px auto;
    }

    .line {
      position: absolute;
      top: 40px;
      width: 100%;
      height: 2px;
      background: black;
    }

    .point {
      position: absolute;
      top: 30px;
      width: 10px;
      height: 10px;
      background: red;
      border-radius: 50%;
    }

    .label {
      position: absolute;
      top: 50px;
      transform: translateX(-50%);
      font-size: 16px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<h2>Quale frazione è più vicina al punto A?</h2>

<div class="line-container">
  <div class="line"></div>
  <div id="pointA" class="point"></div>
  <div id="labelA" class="label">A</div>
</div>

<div id="options"></div>

<button onclick="generate()">Genera nuovo esercizio</button>

<script>
function generate() {
  const denominators = [2, 3, 4, 5, 6, 8];
  const d = denominators[Math.floor(Math.random() * denominators.length)];

  let fractions = [];
  for (let i = 1; i < d; i++) {
    fractions.push({ n: i, d: d, value: i / d });
  }

  // punto A casuale
  let pointValue = Math.random();

  // posizione punto
  let pointPixel = pointValue * 600;
  document.getElementById("pointA").style.left = pointPixel + "px";
  document.getElementById("labelA").style.left = pointPixel + "px";

  // scegli 3 frazioni casuali
  fractions.sort(() => 0.5 - Math.random());
  let options = fractions.slice(0, 3);

  // trova la più vicina
  let correct = options.reduce((prev, curr) =>
    Math.abs(curr.value - pointValue) < Math.abs(prev.value - pointValue) ? curr : prev
  );

  let container = document.getElementById("options");
  container.innerHTML = "";

  options.forEach(f => {
    let btn = document.createElement("button");
    btn.innerHTML = `${f.n}/${f.d}`;

    btn.onclick = () => {
      if (f === correct) {
        alert("Corretto!");
      } else {
        alert("Riprova");
      }
    };

    container.appendChild(btn);
  });
}

// primo esercizio
generate();
</script>

</body>
</html>
